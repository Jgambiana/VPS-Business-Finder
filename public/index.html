<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>VPS Business Finder</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 10px;
}

label {
  display:block;
  margin-top:12px;
  font-weight:600;
}

input[type="text"], input[type="number"] {
  width:100%;
  padding:10px;
  margin-top:6px;
  box-sizing:border-box;
}

button {
  margin-top:14px;
  padding:10px 14px;
  cursor:pointer;
}

.layout {
  display:grid;
  grid-template-columns:380px 1fr;
  gap:16px;
}

@media (max-width: 1000px) {
  .layout {
    grid-template-columns:1fr;
  }
}

#map {
  width:100%;
  height:460px;
  border:1px solid #ddd;
  border-radius:8px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
  vertical-align:top;
}

th {
  background:#f6f6f6;
}

.muted {
  color:#666;
  font-size:0.9em;
  margin-top:10px;
}

.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:9999;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.modal-overlay.show {
  display:flex;
}

.modal-box {
  background:#fff;
  max-width:900px;
  width:100%;
  max-height:90vh;
  overflow:auto;
  padding:20px;
  border-radius:10px;
  position:relative;
}

.modal-close {
  position:absolute;
  right:10px;
  top:10px;
  font-size:26px;
  cursor:pointer;
  background:none;
  border:none;
}
</style>
</head>

<body>

<h2>VPS Business Finder</h2>

<div class="layout">
  <div>
    <label>ZIP or Location</label>
    <input id="location" placeholder="55344 or Eden Prairie, MN">

    <label>Business Type</label>
    <input id="businessType" placeholder="restaurant">

    <label>Radius (miles)</label>
    <input id="radiusMiles" type="number" value="10">

    <label>Max Results</label>
    <input id="maxResults" type="number" value="60">

    <div>
      <button id="searchBtn">Search</button>
      <button id="downloadBtn">Download CSV</button>
      <button id="bookMeetingBtn">Book Meeting</button>
    </div>

    <div class="muted" id="status"></div>
  </div>

  <div>
    <div id="map"></div>
    <div class="muted">Click a table row to zoom to the map pin</div>
  </div>
</div>

<div id="results"></div>

<div id="meetingModal" class="modal-overlay">
  <div class="modal-box">
    <button id="closeMeetingModal" class="modal-close">&times;</button>
    <h3>Book Meeting</h3>

    <div
      class="meetings-iframe-container"
      data-src="https://meetings-na2.hubspot.com/joel-gambiana?embed=true"
      style="min-height:700px;width:100%;">
    </div>
  </div>
</div>

<script>
const apiUrl = "/api/search";

let map;
let markers = [];
let markerCluster;
let infoWindow;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 44.9778, lng: -93.2650 },
    zoom: 10
  });

  infoWindow = new google.maps.InfoWindow();
}

function escapeHtml(str) {
  return (str || "").replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[m]));
}

function clearMap() {
  if (markerCluster) {
    markerCluster.clearMarkers();
    markerCluster = null;
  }

  markers.forEach(m => m.setMap(null));
  markers = [];
}

function plotResults(results) {
  clearMap();

  const bounds = new google.maps.LatLngBounds();

  results.forEach((r) => {
    if (!r.lat || !r.lng) return;

    const marker = new google.maps.Marker({
      position: { lat: Number(r.lat), lng: Number(r.lng) },
      title: r.name
    });

    marker.addListener("click", () => {
      infoWindow.setContent(`
        <div>
          <b>${escapeHtml(r.name)}</b><br>
          ${escapeHtml(r.contactName || "")}<br>
          ${escapeHtml(r.phone || "")}<br>
          ${escapeHtml(r.address || "")}<br>
          ${escapeHtml(r.email || "")}
        </div>
      `);

      infoWindow.open({
        map,
        anchor: marker
      });
    });

    markers.push(marker);
    bounds.extend(marker.getPosition());
  });

  if (markers.length) {
    markerCluster = new markerClusterer.MarkerClusterer({ map, markers });
    map.fitBounds(bounds);
  }
}

function focusMarker(index) {
  const marker = markers[index];
  if (!marker) return;

  map.panTo(marker.getPosition());
  map.setZoom(15);
  google.maps.event.trigger(marker, "click");
}

async function runSearch() {
  const location = document.getElementById("location").value.trim();
  const businessType = document.getElementById("businessType").value.trim();
  const radiusMiles = Number(document.getElementById("radiusMiles").value);
  const maxResults = Number(document.getElementById("maxResults").value);

  const status = document.getElementById("status");
  const resultsDiv = document.getElementById("results");

  status.textContent = "Searching...";
  resultsDiv.innerHTML = "";

  try {
    const res = await fetch(apiUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        location,
        businessType,
        radiusMiles,
        maxResults,
        scrapeEmails: true,
        useHunter: false
      })
    });

    let data = {};
    try {
      data = await res.json();
    } catch (_) {
      data = {};
    }

    if (!res.ok) {
      status.textContent = data.error || `Search failed (${res.status})`;
      return;
    }

    status.textContent = `Found ${data.count} results`;

    plotResults(data.results || []);

  const rows = data.results.map((r,i)=>`

<tr data-idx="${i}">

<td>${r.name}</td>

<td>${r.contactName || ""}</td>

<td>${r.email || ""}</td>

<td>${r.phone || ""}</td>

<td>${r.address || ""}</td>

<td>${r.website ? `<a href="${r.website}" target="_blank">Website</a>` : ""}</td>

<td>${r.googleMapsUrl ? `<a href="${r.googleMapsUrl}" target="_blank">Map</a>` : ""}</td>

<td>
<button onclick='openIntakeForm(${JSON.stringify(r)})'>
Open Intake Form
</button>
</td>

</tr>

`).join("")

    resultsDiv.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Business</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Website</th>
            <th>Google</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          ${rows}
        </tbody>
      </table>
    `;

    const tbody = document.getElementById("resultsBody");
    if (tbody) {
      tbody.addEventListener("click", (e) => {
        const tr = e.target.closest("tr");
        if (!tr) return;
        const idx = Number(tr.getAttribute("data-idx"));
        focusMarker(idx);
      });
    }

  } catch (e) {
    console.error(e);
    status.textContent = "Error contacting server: " + (e.message || "unknown error");
  }
}

async function downloadCsv() {
  const location = document.getElementById("location").value.trim();
  const businessType = document.getElementById("businessType").value.trim();
  const radiusMiles = Number(document.getElementById("radiusMiles").value);
  const maxResults = Number(document.getElementById("maxResults").value);

  const status = document.getElementById("status");

  try {
    const res = await fetch("/api/search.csv", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        location,
        businessType,
        radiusMiles,
        maxResults,
        scrapeEmails: true,
        useHunter: false
      })
    });

    if (!res.ok) {
      let err = {};
      try {
        err = await res.json();
      } catch (_) {
        err = {};
      }
      status.textContent = err.error || "CSV export failed";
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "business_results.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
    status.textContent = "CSV downloaded";
  } catch (e) {
    console.error(e);
    status.textContent = "CSV export failed";
  }
}

document.getElementById("searchBtn").addEventListener("click", runSearch);
document.getElementById("downloadBtn").addEventListener("click", downloadCsv);

const meetingModal = document.getElementById("meetingModal");

document.getElementById("bookMeetingBtn").onclick = () => {
  meetingModal.classList.add("show");
};

document.getElementById("closeMeetingModal").onclick = () => {
  meetingModal.classList.remove("show");
};

meetingModal.addEventListener("click", (e) => {
  if (e.target === meetingModal) {
    meetingModal.classList.remove("show");
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    meetingModal.classList.remove("show");
  }
});
function parseAddressParts(address) {
  if (!address) {
    return { city: "", state: "", zip: "" };
  }

  // Example expected format:
  // "123 Main St, Minneapolis, MN 55401"
  const parts = address.split(",").map(p => p.trim());

  let city = "";
  let state = "";
  let zip = "";

  if (parts.length >= 2) {
    city = parts[parts.length - 2] || "";
  }

  if (parts.length >= 1) {
    const lastPart = parts[parts.length - 1] || "";

    // Handles "MN 55401" or "Minnesota 55401"
    const match = lastPart.match(/^([A-Za-z\s]+)\s+(\d{5}(?:-\d{4})?)$/);

    if (match) {
      state = match[1].trim();
      zip = match[2].trim();
    } else {
      state = lastPart.trim();
    }
  }

  return { city, state, zip };
}

function openIntakeForm(r) {
  const url = new URL("https://quiet-recipe-ef97.jgambiana.workers.dev/");

  if (r.name) url.searchParams.set("companyName", r.name);

  if (r.phone) {
    url.searchParams.set("companyPhone", r.phone);
    url.searchParams.set("contactPhone", r.phone);
    url.searchParams.set("companyPhoneCode", "+1");
    url.searchParams.set("contactPhoneCode", "+1");
  }

  if (r.email) {
    url.searchParams.set("companyEmail", r.email);
    url.searchParams.set("contactEmail", r.email);
  }

  if (r.website) url.searchParams.set("website", r.website);

  if (r.address) {
    url.searchParams.set("address", r.address);

    const parsed = parseAddressParts(r.address);

    if (parsed.city) url.searchParams.set("city", parsed.city);
    if (parsed.state) url.searchParams.set("state", parsed.state);
    if (parsed.zip) url.searchParams.set("zip", parsed.zip);
  }

  if (r.contactName) {
    const parts = r.contactName.trim().split(/\s+/);
    if (parts.length > 0) url.searchParams.set("firstName", parts[0]);
    if (parts.length > 1) url.searchParams.set("lastName", parts.slice(1).join(" "));
  }

  if (r.contactTitle) url.searchParams.set("jobTitle", r.contactTitle);

  url.searchParams.set("callDisposition", "Connected");
  url.searchParams.set("notes", "Lead opened from VPS Business Finder");

  window.open(url.toString(), "_blank");
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCDcAQG2iVH6sDyZ6BMyrZh-5CrUeHtD4M&callback=initMap" async defer></script>
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
<script src="https://static.hsappstatic.net/MeetingsEmbed/ex/MeetingsEmbedCode.js"></script>

</body>
</html>
