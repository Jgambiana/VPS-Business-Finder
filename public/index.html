<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>VPS Business Finder</title>

<style>

body {
  font-family: Arial, sans-serif;
  max-width: 1300px;
  margin: 30px auto;
  padding: 0 10px;
}

label {
  display:block;
  margin-top:12px;
  font-weight:600;
}

input[type="text"], input[type="number"] {
  width:100%;
  padding:10px;
  margin-top:6px;
  box-sizing:border-box;
}

button {
  margin-top:14px;
  padding:10px 14px;
  cursor:pointer;
}

.layout {
  display:grid;
  grid-template-columns:380px 1fr;
  gap:16px;
}

#map {
  width:100%;
  height:460px;
  border:1px solid #ddd;
  border-radius:8px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
}

th {
  background:#f6f6f6;
}

.muted {
  color:#666;
  font-size:0.9em;
}

.score {
  font-weight:bold;
}

.score.high { color:green }
.score.mid { color:orange }
.score.low { color:red }

.platform {
  font-weight:600;
}

.ordering {
  color:#0077cc;
  font-weight:600;
}

.intakeBtn{
  padding:6px 10px;
  font-size:13px;
}

</style>

</head>

<body>

<h2>VPS Business Finder</h2>

<div class="layout">

<div>

<label>ZIP or Location</label>
<input id="location" placeholder="55344 or Eden Prairie, MN">

<label>Business Type</label>
<input id="businessType" placeholder="restaurant">

<label>Radius (miles)</label>
<input id="radiusMiles" type="number" value="10">

<label>Max Results</label>
<input id="maxResults" type="number" value="300">

<div>
<button id="searchBtn">Search</button>
<button id="downloadBtn">Download CSV</button>
</div>

<div class="muted" id="status"></div>

</div>

<div>
<div id="map"></div>
<div class="muted">Click a table row to zoom to map</div>
</div>

</div>

<div id="results"></div>

<script>

const apiUrl="/api/search"

let map
let markers=[]
let infoWindow

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:44.9778,lng:-93.2650},
zoom:10
})

infoWindow=new google.maps.InfoWindow()

}

function clearMap(){

markers.forEach(m=>m.setMap(null))
markers=[]

}

function plotResults(results){

clearMap()

const bounds=new google.maps.LatLngBounds()

results.forEach(r=>{

if(!r.lat || !r.lng) return

const marker=new google.maps.Marker({
position:{lat:Number(r.lat),lng:Number(r.lng)},
map,
title:r.name
})

marker.addListener("click",()=>{

infoWindow.setContent(`
<b>${r.name}</b><br>
${r.phone || ""}<br>
${r.address || ""}
`)

infoWindow.open(map,marker)

})

markers.push(marker)
bounds.extend(marker.position)

})

if(markers.length){
map.fitBounds(bounds)
}

}

function scoreClass(score){

if(score >= 80) return "high"
if(score >= 60) return "mid"
return "low"

}

function stars(rating){

if(!rating) return ""

const rounded=Math.round(rating)
let html=""

for(let i=0;i<rounded;i++){
html+="⭐"
}

return html+" "+rating

}

function intakeUrl(r){

const params=new URLSearchParams()

params.set("companyName",r.name || "")
params.set("companyPhone",r.phone || "")
params.set("companyEmail",r.email || "")
params.set("website",r.website || "")
params.set("address",r.address || "")

return "https://quiet-recipe-ef97.jgambiana.workers.dev/?"+params.toString()

}

async function runSearch(){

const location=document.getElementById("location").value.trim()
const businessType=document.getElementById("businessType").value.trim()
const radiusMiles=Number(document.getElementById("radiusMiles").value)
const maxResults=Number(document.getElementById("maxResults").value)

const status=document.getElementById("status")
const resultsDiv=document.getElementById("results")

status.textContent="Searching..."

try{

const res=await fetch(apiUrl,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
location,
businessType,
radiusMiles,
maxResults,
scrapeEmails:true,
useHunter:false
})
})

const data=await res.json()

if(!res.ok){

status.textContent=data.error || "Search failed"
return

}

status.textContent=`Found ${data.count} results`

plotResults(data.results)

const rows=data.results.map((r,i)=>`

<tr data-idx="${i}">

<td>${r.name}</td>

<td class="score ${scoreClass(r.opportunityScore)}">
${r.opportunityScore}
</td>

<td>${r.contactName || ""}</td>

<td>${r.email || ""}</td>

<td>${r.phone || ""}</td>

<td>${r.address || ""}</td>

<td>${stars(r.rating)}</td>

<td class="platform">${r.tech?.platform || ""}</td>

<td class="ordering">
${r.tech?.ordering ? "Yes" : ""}
</td>

<td>
<button class="intakeBtn"
onclick="window.open('${intakeUrl(r)}','_blank')">
Open Intake
</button>
</td>

</tr>

`).join("")

resultsDiv.innerHTML=`

<table>

<thead>
<tr>

<th>Business</th>
<th>Score</th>
<th>Contact</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Reviews</th>
<th>Platform</th>
<th>Ordering</th>
<th>Intake</th>

</tr>
</thead>

<tbody>
${rows}
</tbody>

</table>

`

}catch(e){

console.error(e)
status.textContent="Error contacting server"

}

}

async function downloadCsv(){

const location=document.getElementById("location").value.trim()
const businessType=document.getElementById("businessType").value.trim()
const radiusMiles=Number(document.getElementById("radiusMiles").value)
const maxResults=Number(document.getElementById("maxResults").value)

const res=await fetch("/api/search.csv",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
location,
businessType,
radiusMiles,
maxResults,
scrapeEmails:true
})
})

const blob=await res.blob()

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="business_results.csv"
a.click()

URL.revokeObjectURL(url)

}

document.getElementById("searchBtn").addEventListener("click",runSearch)
document.getElementById("downloadBtn").addEventListener("click",downloadCsv)

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCDcAQG2iVH6sDyZ6BMyrZh-5CrUeHtD4M&callback=initMap" async defer></script>

</body>
</html>
