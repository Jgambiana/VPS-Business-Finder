<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VPS Business Finder</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1200px; margin: 30px auto; padding: 0 10px; }
    label { display:block; margin-top:12px; font-weight:600; }
    input[type="text"], input[type="number"] { width:100%; padding:10px; margin-top:6px; box-sizing:border-box; }
    button { margin-top:14px; padding:10px 14px; cursor:pointer; }
    .muted { color:#666; font-size:0.9em; margin-top:10px; }

    .layout {
      display:grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      align-items:start;
    }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; }
    }

    #map {
      width:100%;
      height:460px;
      border:1px solid #ddd;
      border-radius:8px;
    }

    table { width:100%; border-collapse:collapse; margin-top:18px; font-size:14px; }
    th, td { border:1px solid #ddd; padding:10px; vertical-align:top; }
    th { text-align:left; background:#f6f6f6; position:sticky; top:0; }
    tr:hover { background:#fafafa; }
    .controls-row { margin-top:12px; }
    .checkbox-row { margin-top:14px; display:flex; align-items:center; gap:8px; }
  </style>
</head>
<body>

<h2>VPS Business Finder</h2>

<div class="layout">
  <div>
    <label>ZIP or Location</label>
    <input id="location" type="text" placeholder="55344 or Eden Prairie, MN" />

    <label>Business Type</label>
    <input id="businessType" type="text" placeholder="restaurant" />

    <label>Radius (miles)</label>
    <input id="radiusMiles" type="number" value="10" min="1" max="30" />

    <label>Max Results</label>
    <input id="maxResults" type="number" value="60" min="1" max="120" />

    <div class="checkbox-row">
      <input id="scrapeEmails" type="checkbox" checked />
      <label for="scrapeEmails" style="margin:0;">Scrape emails from websites</label>
    </div>

    <div class="controls-row">
      <button id="searchBtn">Search</button>
      <button id="downloadBtn">Download CSV</button>
    </div>

    <div class="muted" id="status"></div>
  </div>

  <div>
    <div id="map"></div>
    <div class="muted">Pins are clustered. Click a table row to focus its pin.</div>
  </div>
</div>

<div id="results"></div>

<script>
  const apiUrl = "/api/search";

  function escapeHtml(str) {
    return (str || "").replace(/[&<>"']/g, m => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[m]));
  }

  let map;
  let markers = [];
  let markerCluster;
  let infoWindow;

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 44.9778, lng: -93.2650 },
      zoom: 10,
    });

    infoWindow = new google.maps.InfoWindow();
  }

  function clearMapMarkers() {
    if (markerCluster) {
      markerCluster.clearMarkers();
      markerCluster = null;
    }

    markers.forEach(m => m.setMap(null));
    markers = [];
  }

  function plotResultsOnMap(results) {
    clearMapMarkers();

    const bounds = new google.maps.LatLngBounds();

    results.forEach((r, idx) => {
      const lat = Number(r.lat);
      const lng = Number(r.lng);

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

      const marker = new google.maps.Marker({
        position: { lat, lng },
        title: r.name || ""
      });

      marker.addListener("click", () => {
        infoWindow.setContent(`
          <div style="font-family:Arial;font-size:14px;max-width:260px;">
            <div style="font-weight:bold;margin-bottom:4px;">${escapeHtml(r.name || "")}</div>
            <div>${escapeHtml(r.address || "")}</div>
            <div>${escapeHtml(r.phone || "")}</div>
            <div>Rating: ${escapeHtml(String(r.rating || ""))} ${r.reviewCount ? `(${escapeHtml(String(r.reviewCount))})` : ""}</div>
            ${r.website ? `<div><a href="${r.website}" target="_blank">Website</a></div>` : ""}
            ${r.googleMapsUrl ? `<div><a href="${r.googleMapsUrl}" target="_blank">Google Maps</a></div>` : ""}
            ${r.email ? `<div>Email: ${escapeHtml(r.email)}</div>` : ""}
          </div>
        `);
        infoWindow.open({ map, anchor: marker });
      });

      markers.push(marker);
      bounds.extend({ lat, lng });
    });

    if (markers.length) {
      markerCluster = new markerClusterer.MarkerClusterer({ map, markers });
      map.fitBounds(bounds);
    }
  }

  function focusMarker(index) {
    const marker = markers[index];
    if (!marker) return;
    map.panTo(marker.getPosition());
    map.setZoom(15);
    google.maps.event.trigger(marker, "click");
  }

  async function runSearch() {
    const location = document.getElementById("location").value.trim();
    const businessType = document.getElementById("businessType").value.trim();
    const radiusMiles = Number(document.getElementById("radiusMiles").value || 10);
    const maxResults = Number(document.getElementById("maxResults").value || 60);
    const scrapeEmails = document.getElementById("scrapeEmails").checked;

    const status = document.getElementById("status");
    const resultsDiv = document.getElementById("results");

    if (!location || !businessType) {
      status.textContent = "Please enter a location and business type.";
      return;
    }

    resultsDiv.innerHTML = "";
    status.textContent = "Searching...";

    try {
      const res = await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ location, businessType, radiusMiles, maxResults, scrapeEmails })
      });

      const data = await res.json();

      if (!res.ok) {
        status.textContent = data.error || "Search failed.";
        return;
      }

      status.textContent = `Found ${data.count} results`;
      const results = data.results || [];

      plotResultsOnMap(results);

      const rows = results.map((r, i) => `
        <tr data-idx="${i}">
          <td>${escapeHtml(r.name)}</td>
          <td>${escapeHtml(r.phone || "")}</td>
          <td>${escapeHtml(r.address || "")}</td>
          <td>${escapeHtml(r.email || "")}</td>
          <td>${escapeHtml(String(r.rating || ""))}</td>
          <td>${escapeHtml(String(r.reviewCount || ""))}</td>
          <td>${r.website ? `<a href="${r.website}" target="_blank">Website</a>` : ""}</td>
          <td>${r.googleMapsUrl ? `<a href="${r.googleMapsUrl}" target="_blank">Map</a>` : ""}</td>
        </tr>
      `).join("");

      resultsDiv.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Email</th>
              <th>Rating</th>
              <th>Reviews</th>
              <th>Website</th>
              <th>Google</th>
            </tr>
          </thead>
          <tbody id="resultsBody">${rows}</tbody>
        </table>
      `;

      document.getElementById("resultsBody").addEventListener("click", (e) => {
        const tr = e.target.closest("tr");
        if (!tr) return;
        const idx = Number(tr.getAttribute("data-idx"));
        focusMarker(idx);
      });

    } catch (e) {
      console.error(e);
      status.textContent = "Error contacting server";
    }
  }

  async function downloadCsv() {
    const location = document.getElementById("location").value.trim();
    const businessType = document.getElementById("businessType").value.trim();
    const radiusMiles = Number(document.getElementById("radiusMiles").value || 10);
    const maxResults = Number(document.getElementById("maxResults").value || 60);
    const scrapeEmails = document.getElementById("scrapeEmails").checked;

    const status = document.getElementById("status");
    status.textContent = "Preparing CSV...";

    const res = await fetch("/api/search.csv", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ location, businessType, radiusMiles, maxResults, scrapeEmails })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      status.textContent = err.error || "CSV export failed";
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "business_results.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
    status.textContent = "CSV Downloaded";
  }

  document.getElementById("searchBtn").addEventListener("click", runSearch);
  document.getElementById("downloadBtn").addEventListener("click", downloadCsv);
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD3aKyqlgr8raLl2z7GHg5GpbUMOUxNz4Y&callback=initMap"
  async defer>
</script>

<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

</body>
</html>
