<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>VPS Business Finder</title>

<style>

body {
  font-family: Arial, sans-serif;
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 10px;
}

label {
  display:block;
  margin-top:12px;
  font-weight:600;
}

input[type="text"], input[type="number"] {
  width:100%;
  padding:10px;
  margin-top:6px;
  box-sizing:border-box;
}

button {
  margin-top:14px;
  padding:10px 14px;
  cursor:pointer;
}

.layout {
  display:grid;
  grid-template-columns:380px 1fr;
  gap:16px;
}

#map {
  width:100%;
  height:460px;
  border:1px solid #ddd;
  border-radius:8px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
}

th {
  background:#f6f6f6;
}

.muted {
  color:#666;
  font-size:0.9em;
  margin-top:10px;
}

/* modal */

.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:9999;
  justify-content:center;
  align-items:center;
}

.modal-overlay.show{
  display:flex;
}

.modal-box{
  background:#fff;
  max-width:900px;
  width:100%;
  padding:20px;
  border-radius:10px;
  position:relative;
}

.modal-close{
  position:absolute;
  right:10px;
  top:10px;
  font-size:26px;
  cursor:pointer;
}

</style>

</head>

<body>

<h2>VPS Business Finder</h2>

<div class="layout">

<div>

<label>ZIP or Location</label>
<input id="location" placeholder="55344 or Eden Prairie, MN">

<label>Business Type</label>
<input id="businessType" placeholder="restaurant">

<label>Radius (miles)</label>
<input id="radiusMiles" type="number" value="10">

<label>Max Results</label>
<input id="maxResults" type="number" value="60">

<div>
<button id="searchBtn">Search</button>
<button id="downloadBtn">Download CSV</button>
<button id="bookMeetingBtn">Book Meeting</button>
</div>

<div class="muted" id="status"></div>

</div>

<div>
<div id="map"></div>
<div class="muted">Click a table row to zoom to the map pin</div>
</div>

</div>

<div id="results"></div>


<!-- Meeting Modal -->

<div id="meetingModal" class="modal-overlay">
<div class="modal-box">

<div id="closeMeetingModal" class="modal-close">×</div>

<h3>Book Meeting</h3>

<div
class="meetings-iframe-container"
data-src="https://meetings-na2.hubspot.com/joel-gambiana">
</div>

</div>
</div>


<script>

const apiUrl="/api/search"

let map
let markers=[]
let markerCluster
let infoWindow

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:44.9778,lng:-93.2650},
zoom:10
})

infoWindow=new google.maps.InfoWindow()

}

function clearMap(){

if(markerCluster){
markerCluster.clearMarkers()
markerCluster=null
}

markers.forEach(m=>m.setMap(null))
markers=[]

}

function plotResults(results){

clearMap()

const bounds=new google.maps.LatLngBounds()

results.forEach(r=>{

if(!r.lat || !r.lng) return

const marker=new google.maps.Marker({
position:{lat:Number(r.lat),lng:Number(r.lng)},
title:r.name
})

marker.addListener("click",()=>{

infoWindow.setContent(`
<div>
<b>${r.name}</b><br>
${r.contactName || ""}<br>
${r.phone || ""}<br>
${r.address || ""}<br>
${r.email || ""}
</div>
`)

infoWindow.open(map,marker)

})

markers.push(marker)
bounds.extend(marker.position)

})

if(markers.length){

markerCluster=new markerClusterer.MarkerClusterer({map,markers})
map.fitBounds(bounds)

}

}

async function runSearch(){

const location=document.getElementById("location").value.trim()
const businessType=document.getElementById("businessType").value.trim()
const radiusMiles=Number(document.getElementById("radiusMiles").value)
const maxResults=Number(document.getElementById("maxResults").value)

const status=document.getElementById("status")
const resultsDiv=document.getElementById("results")

status.textContent="Searching..."

try{

const res=await fetch(apiUrl,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
location,
businessType,
radiusMiles,
maxResults,
scrapeEmails:true,
useHunter:false
})
})

const data=await res.json()

if(!res.ok){

status.textContent=data.error || "Search failed"
return

}

status.textContent=`Found ${data.count} results`

plotResults(data.results)

const rows=data.results.map((r,i)=>`

<tr data-idx="${i}">
<td>${r.name}</td>
<td>${r.contactName || ""}</td>
<td>${r.email || ""}</td>
<td>${r.phone || ""}</td>
<td>${r.address || ""}</td>
<td>${r.website ? `<a href="${r.website}" target="_blank">Website</a>` : ""}</td>
<td>${r.googleMapsUrl ? `<a href="${r.googleMapsUrl}" target="_blank">Map</a>` : ""}</td>
</tr>

`).join("")

resultsDiv.innerHTML=`

<table>

<thead>
<tr>
<th>Business</th>
<th>Contact</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
<th>Website</th>
<th>Google</th>
</tr>
</thead>

<tbody id="resultsBody">
${rows}
</tbody>

</table>

`

}catch(e){

console.error(e)
status.textContent="Error contacting server"

}

}

async function downloadCsv(){

const location=document.getElementById("location").value.trim()
const businessType=document.getElementById("businessType").value.trim()
const radiusMiles=Number(document.getElementById("radiusMiles").value)
const maxResults=Number(document.getElementById("maxResults").value)

const res=await fetch("/api/search.csv",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
location,
businessType,
radiusMiles,
maxResults,
scrapeEmails:true,
useHunter:false
})
})

const blob=await res.blob()

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="business_results.csv"
a.click()

URL.revokeObjectURL(url)

}

document.getElementById("searchBtn").addEventListener("click",runSearch)
document.getElementById("downloadBtn").addEventListener("click",downloadCsv)


/* meeting modal */

const meetingModal=document.getElementById("meetingModal")

document.getElementById("bookMeetingBtn").onclick=()=>{
meetingModal.classList.add("show")
}

document.getElementById("closeMeetingModal").onclick=()=>{
meetingModal.classList.remove("show")
}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD3aKyqlgr8raLl2z7GHg5GpbUMOUxNz4Y&callback=initMap" async defer></script>
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
<script src="https://meetings-na2.hubspot.com/joel-gambiana"></script>

</body>
</html>
